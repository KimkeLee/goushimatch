<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Match Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="time-panel">
                <span class="time-label">Time</span>
                <span class="time-value" id="time">60</span>
                <span class="time-unit">s</span>
            </div>
            <div class="score-panel">
                <span class="score-label">Score</span>
                <span class="score-value" id="score">0</span>
            </div>
            <button class="restart-btn" id="restartBtn">Restart</button>
        </header>
        
        <main class="game-board" id="gameBoard">
            <div class="board-container">
                <div class="grid" id="grid"></div>
            </div>
        </main>
        
        <footer class="game-footer">
            <div class="combo-display" id="combo"></div>
            <div class="special-notice" id="specialNotice"></div>
        </footer>
        
        <div class="game-over" id="gameOver">
            <div class="game-over-content">
                <h2>Game Over!</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button class="restart-btn" id="finalRestartBtn">Play Again</button>
            </div>
        </div>
    </div>
    
    <audio id="bgm" src="assets/bgm.mp3" loop preload="auto">
    <audio id="clearSound" src="assets/clear.wav" preload="auto">
    <audio id="specialSound" src="assets/special.wav" preload="auto">
    
    <script src="game.js"></script>
</body>
</html>
